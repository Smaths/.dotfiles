# tmux configuration for this dotfiles repo.
# Symlinked to ~/.tmux.conf on macOS and Debian servers by the bootstrap scripts.

# Prefix -> Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -sg escape-time 10          # responsive Esc (matters in vim)
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on
set -g history-limit 50000      # bigger scrollback
set -g mouse on                 # scroll/click/drag-resize
set -g focus-events on          # let vim see focus (autoread, gitgutter)
set -g set-clipboard on         # copy mode -> macOS clipboard via ghostty OSC 52

# Intuitive splits, keep current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Colors (true color + undercurl for ghostty / vim diagnostics)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'                                       # undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p2%{256}%/%d::%p3%d%;m' # underline color
